name: enhe-ai-tools

services:
  db:
    image: postgres:16-alpine
    container_name: enhe-ai-tools-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    expose:
      - "5432"
    volumes:
      - enhe-ai-tools-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 8
    networks:
      - enhe-ai-tools-net

  app:
    build:
      context: ../..
      dockerfile: deploy/enhe-ai-tools/Dockerfile
    container_name: enhe-ai-tools-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@enhe-ai-tools-db:5432/${POSTGRES_DB}?schema=public
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      AUTH_COOKIE_NAME: ${AUTH_COOKIE_NAME}
      AUTH_SECRET: ${AUTH_SECRET}
      UPLOAD_DIR: /app/public/uploads
      TENCENT_COS_SECRET_ID: ${TENCENT_COS_SECRET_ID}
      TENCENT_COS_SECRET_KEY: ${TENCENT_COS_SECRET_KEY}
      TENCENT_COS_BUCKET: ${TENCENT_COS_BUCKET}
      TENCENT_COS_REGION: ${TENCENT_COS_REGION}
    ports:
      - "3001:3000"
    volumes:
      - ./uploads:/app/public/uploads
    networks:
      - enhe-ai-tools-net

volumes:
  enhe-ai-tools-postgres-data:

networks:
  enhe-ai-tools-net:
    name: enhe-ai-tools-net

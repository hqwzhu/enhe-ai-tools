<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ENHE AI dark SaaS UI direction preview</title>
    <style>
      :root {
        color-scheme: dark;
        --ink: #ffffff;
        --muted: #b9bec9;
        --soft: #24262d;
        --line: rgba(255, 255, 255, 0.1);
        --accent: #f05a35;
        --paper: #22242a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background:
          radial-gradient(circle at 74% 28%, rgba(240, 90, 53, 0.08), transparent 23rem),
          linear-gradient(180deg, #22242a 0%, #202229 100%);
        color: var(--ink);
        font-family:
          "Microsoft YaHei",
          "PingFang SC",
          "Noto Sans SC",
          Arial,
          sans-serif;
      }

      .page {
        min-height: 100vh;
        padding: 28px 54px 42px;
      }

      .nav {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 40px;
        max-width: 1120px;
        margin: 0 auto;
      }

      .brand {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        font-size: 26px;
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .mark {
        width: 46px;
        height: 30px;
        overflow: hidden;
      }

      .mark img {
        width: 100%;
        height: 100%;
        display: block;
        object-fit: contain;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        font-size: 14px;
        font-weight: 700;
        color: #f3f4f7;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 24px;
        margin-left: auto;
        font-size: 14px;
        font-weight: 700;
        color: #ffffff;
      }

      .nav-cta {
        border: 0;
        border-radius: 5px;
        background: var(--accent);
        color: #fff;
        padding: 14px 22px;
        font-weight: 800;
        box-shadow: 0 14px 34px rgba(240, 90, 53, 0.22);
      }

      .hero {
        max-width: 1120px;
        min-height: 640px;
        margin: 0 auto;
        padding: 125px 0 0;
        text-align: center;
        position: relative;
      }

      .eyebrow {
        margin: 0;
        color: #f2f4f8;
        font-size: 15px;
        font-weight: 800;
      }

      h1 {
        max-width: 760px;
        margin: 42px auto 24px;
        font-size: clamp(68px, 7.2vw, 96px);
        line-height: 0.98;
        letter-spacing: -0.045em;
        font-weight: 900;
        color: #ffffff;
      }

      .subcopy {
        max-width: 660px;
        margin: 0 auto;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.75;
        font-weight: 600;
      }

      .proof {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 46px;
        margin-top: 34px;
      }

      .proof-item {
        display: flex;
        align-items: center;
        justify-content: center;
        min-width: 150px;
      }

      .proof-value {
        display: block;
        font-size: 25px;
        font-weight: 900;
        letter-spacing: -0.025em;
        color: #ffffff;
      }

      .proof-label {
        display: block;
        margin-top: 4px;
        color: #a6abb6;
        font-size: 12px;
        font-weight: 800;
      }

      .actions {
        display: flex;
        justify-content: center;
        gap: 16px;
        margin-top: 38px;
      }

      .btn {
        min-width: 132px;
        border-radius: 5px;
        padding: 15px 22px;
        border: 0;
        font-size: 14px;
        font-weight: 850;
      }

      .btn-dark {
        background: #050505;
        color: #fff;
        box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.08);
      }

      .btn-accent {
        background: var(--accent);
        color: #fff;
      }

      .product-peek {
        width: min(920px, 90%);
        height: 160px;
        margin: 54px auto 0;
        border-radius: 18px 18px 0 0;
        border: 1px solid rgba(255, 255, 255, 0.1);
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.035)),
          repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.05) 0 1px, transparent 1px 74px),
          #262932;
        box-shadow: 0 -12px 70px rgba(0, 0, 0, 0.18);
        overflow: hidden;
        position: relative;
      }

      .product-bar {
        height: 42px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 9px;
        padding: 0 18px;
      }

      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: #555b68;
      }

      .product-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr 0.9fr;
        gap: 14px;
        padding: 20px;
      }

      .panel {
        min-height: 84px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.06);
        padding: 14px;
      }

      .panel-title {
        width: 50%;
        height: 10px;
        border-radius: 99px;
        background: #ffffff;
      }

      .panel-line {
        width: 86%;
        height: 8px;
        margin-top: 16px;
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.22);
      }

      .panel-line.small {
        width: 62%;
        margin-top: 10px;
      }

      @media (max-width: 860px) {
        .page {
          padding: 22px 20px 34px;
        }

        .nav {
          align-items: flex-start;
        }

        .nav-links,
        .nav-right span {
          display: none;
        }

        .hero {
          min-height: auto;
          padding-top: 86px;
        }

        h1 {
          font-size: 56px;
        }

        .proof {
          flex-direction: column;
          gap: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <nav class="nav" aria-label="ENHE AI preview navigation">
        <div class="brand">
          <span class="mark"><img src="./enhe-icon-gradient-transparent-cropped.png" alt="" /></span>
          ENHE AI
        </div>
        <div class="nav-links">
          <span>AI软件应用</span>
          <span>AI账号服务</span>
          <span>AI技能学习</span>
          <span>更新日志</span>
        </div>
        <div class="nav-right">
          <span>帮助支持</span>
          <span>登录</span>
          <button class="nav-cta">用户中心</button>
        </div>
      </nav>

      <section class="hero">
        <p class="eyebrow">ENHE AI Tools</p>
        <h1>AI工具<br />即刻可用</h1>
        <p class="subcopy">
          用精选软件、账号服务和技能课程，把重复工作交给 AI 自动化，让创作、运营和学习更快进入结果。
        </p>

        <div class="proof" aria-label="trust proof">
          <div class="proof-item">
            <span>
              <span class="proof-value">30+</span>
              <span class="proof-label">精选工具与课程</span>
            </span>
          </div>
          <div class="proof-item">
            <span>
              <span class="proof-value">自动解锁</span>
              <span class="proof-label">支付后开通权益</span>
            </span>
          </div>
        </div>

        <div class="actions">
          <button class="btn btn-dark">AI软件应用</button>
          <button class="btn btn-accent">AI技能学习</button>
        </div>

        <div class="product-peek" aria-hidden="true">
          <div class="product-bar">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
          </div>
          <div class="product-grid">
            <div class="panel">
              <div class="panel-title"></div>
              <div class="panel-line"></div>
              <div class="panel-line small"></div>
            </div>
            <div class="panel">
              <div class="panel-title"></div>
              <div class="panel-line"></div>
              <div class="panel-line small"></div>
            </div>
            <div class="panel">
              <div class="panel-title"></div>
              <div class="panel-line"></div>
              <div class="panel-line small"></div>
            </div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>

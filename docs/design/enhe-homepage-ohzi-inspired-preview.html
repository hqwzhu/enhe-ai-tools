<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ENHE AI Homepage Concept</title>
    <style>
      :root {
        --bg: #030609;
        --ink: #f6fbff;
        --muted: rgba(224, 237, 246, 0.72);
        --cyan: #38d7f7;
        --blue: #496cff;
        --magenta: #b222f0;
        --amber: #c78330;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--ink);
        font-family:
          Montserrat,
          Satoshi,
          Geist,
          "Microsoft YaHei",
          Arial,
          sans-serif;
      }

      .stage {
        position: relative;
        width: 1600px;
        height: 1000px;
        overflow: hidden;
        background:
          radial-gradient(circle at 50% 38%, rgba(42, 116, 132, 0.3), transparent 28%),
          radial-gradient(circle at 50% 84%, rgba(56, 215, 247, 0.14), transparent 34%),
          radial-gradient(circle at 92% 24%, rgba(199, 131, 48, 0.14), transparent 24%),
          linear-gradient(120deg, #030609 0%, #06121a 47%, #020305 100%);
      }

      .stage::before {
        position: absolute;
        inset: 0;
        content: "";
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.028) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.022) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(circle at 50% 52%, black 0%, transparent 72%);
        opacity: 0.34;
      }

      .noise {
        position: absolute;
        inset: 0;
        opacity: 0.16;
        background-image:
          radial-gradient(circle at 12% 23%, rgba(255, 255, 255, 0.28) 0 1px, transparent 2px),
          radial-gradient(circle at 86% 31%, rgba(56, 215, 247, 0.34) 0 1px, transparent 2px),
          radial-gradient(circle at 44% 77%, rgba(178, 34, 240, 0.26) 0 1px, transparent 2px),
          radial-gradient(circle at 61% 17%, rgba(255, 255, 255, 0.2) 0 1px, transparent 2px);
        background-size: 137px 161px, 193px 177px, 211px 199px, 157px 149px;
      }

      header {
        position: absolute;
        z-index: 8;
        top: 0;
        left: 0;
        right: 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 34px 44px;
        background: transparent;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 22px;
      }

      .brand img {
        width: 196px;
        height: auto;
        object-fit: contain;
        filter: drop-shadow(0 8px 24px rgba(0, 0, 0, 0.52));
      }

      nav {
        display: flex;
        gap: 52px;
        align-items: center;
        margin-left: 66px;
        color: rgba(246, 251, 255, 0.72);
        font-size: 17px;
        font-weight: 600;
      }

      nav span:first-child {
        color: #fff;
      }

      .menu {
        display: grid;
        gap: 7px;
        width: 48px;
        padding: 12px 0;
      }

      .menu i {
        display: block;
        height: 3px;
        border-radius: 99px;
        background: rgba(246, 251, 255, 0.88);
      }

      .copy {
        position: absolute;
        z-index: 5;
        top: 136px;
        left: 0;
        width: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 74px;
        line-height: 0.98;
        letter-spacing: -1px;
        font-weight: 900;
        text-shadow: 0 16px 42px rgba(0, 0, 0, 0.72);
      }

      h1 em {
        color: var(--cyan);
        font-style: normal;
        text-shadow: 0 0 34px rgba(56, 215, 247, 0.35);
      }

      .slogan {
        margin-top: 22px;
        font-size: 27px;
        letter-spacing: 1px;
        font-weight: 650;
        color: rgba(246, 251, 255, 0.9);
      }

      .sub {
        margin-top: 16px;
        max-width: 760px;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.8;
      }

      .core-wrap {
        position: absolute;
        z-index: 3;
        top: 345px;
        left: 50%;
        width: 470px;
        height: 370px;
        transform: translateX(-50%);
        perspective: 900px;
      }

      .halo {
        position: absolute;
        inset: -140px -190px;
        border-radius: 50%;
        background:
          radial-gradient(circle, rgba(56, 215, 247, 0.22), transparent 42%),
          radial-gradient(circle, rgba(178, 34, 240, 0.11), transparent 55%);
        filter: blur(10px);
      }

      .orbit {
        position: absolute;
        inset: -86px -120px;
        border: 1px solid rgba(86, 205, 237, 0.16);
        border-radius: 50%;
        transform: rotateX(58deg) rotateZ(-10deg);
      }

      .orbit.two {
        inset: -40px -72px;
        opacity: 0.66;
      }

      .cube {
        position: absolute;
        left: 54px;
        top: 6px;
        width: 360px;
        height: 330px;
        border-radius: 22px;
        transform: rotateX(58deg) rotateZ(-39deg) skewX(-4deg);
        transform-style: preserve-3d;
        background:
          linear-gradient(145deg, rgba(255, 255, 255, 0.14), rgba(255, 255, 255, 0.025) 42%, rgba(56, 215, 247, 0.12)),
          radial-gradient(circle at 52% 54%, rgba(56, 215, 247, 0.28), transparent 34%),
          rgba(6, 15, 22, 0.56);
        box-shadow:
          inset 0 0 44px rgba(111, 232, 255, 0.16),
          inset 0 0 10px rgba(255, 255, 255, 0.18),
          0 0 80px rgba(56, 215, 247, 0.16),
          0 42px 90px rgba(0, 0, 0, 0.68);
        overflow: hidden;
      }

      .cube::before {
        position: absolute;
        inset: 0;
        content: "";
        border-radius: inherit;
        border: 2px solid rgba(123, 226, 255, 0.38);
        box-shadow: inset 0 0 60px rgba(0, 0, 0, 0.36);
      }

      .cube::after {
        position: absolute;
        content: "";
        left: 8%;
        right: 8%;
        bottom: 5%;
        height: 42%;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(199, 131, 48, 0.4), transparent 66%);
        filter: blur(18px);
        transform: rotate(8deg);
      }

      .core-logo {
        position: absolute;
        z-index: 2;
        left: 46px;
        top: 86px;
        width: 286px;
        opacity: 0.92;
        filter:
          drop-shadow(0 0 18px rgba(56, 215, 247, 0.38))
          drop-shadow(0 0 34px rgba(178, 34, 240, 0.16));
        transform: rotate(0.5deg);
      }

      .reflection {
        position: absolute;
        left: 50%;
        top: 666px;
        width: 630px;
        height: 235px;
        transform: translateX(-50%);
        border-radius: 50%;
        background:
          radial-gradient(ellipse at 50% 18%, rgba(255, 176, 74, 0.28), transparent 28%),
          radial-gradient(ellipse at 50% 30%, rgba(56, 215, 247, 0.2), transparent 50%),
          radial-gradient(ellipse at 50% 72%, rgba(178, 34, 240, 0.12), transparent 58%);
        filter: blur(20px);
        opacity: 0.86;
      }

      .reflection::after {
        position: absolute;
        inset: 24px 30px;
        content: "";
        background:
          linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.12), transparent),
          repeating-linear-gradient(0deg, transparent 0 18px, rgba(255, 255, 255, 0.035) 19px 21px);
        transform: skewX(-10deg);
        opacity: 0.34;
      }

      .cta-row {
        position: absolute;
        z-index: 6;
        left: 0;
        right: 0;
        bottom: 142px;
        display: flex;
        justify-content: center;
        gap: 18px;
      }

      .cta {
        position: relative;
        min-width: 168px;
        padding: 20px 34px;
        border-radius: 28px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.16), rgba(255, 255, 255, 0.035)),
          rgba(5, 11, 15, 0.48);
        color: #fff;
        font-size: 17px;
        font-weight: 800;
        letter-spacing: 2px;
        text-align: center;
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.56),
          inset 0 0 16px rgba(255, 255, 255, 0.11),
          0 24px 70px rgba(0, 0, 0, 0.54);
      }

      .cta.primary {
        background:
          linear-gradient(135deg, rgba(56, 215, 247, 0.28), rgba(255, 255, 255, 0.05)),
          rgba(5, 18, 24, 0.62);
        box-shadow:
          inset 0 1px 1px rgba(255, 255, 255, 0.64),
          0 0 44px rgba(56, 215, 247, 0.18),
          0 22px 70px rgba(0, 0, 0, 0.58);
      }

      .side-note {
        position: absolute;
        z-index: 6;
        left: 60px;
        bottom: 118px;
        color: rgba(246, 251, 255, 0.42);
        font-size: 13px;
        letter-spacing: 2px;
        text-transform: uppercase;
        writing-mode: vertical-rl;
      }

      .scroll {
        position: absolute;
        z-index: 6;
        left: 50%;
        bottom: 46px;
        transform: translateX(-50%);
        color: rgba(246, 251, 255, 0.46);
        font-size: 13px;
        letter-spacing: 2px;
        text-align: center;
      }

      .scroll::before {
        display: block;
        width: 20px;
        height: 20px;
        margin: 0 auto 13px;
        content: "";
        border-right: 2px solid rgba(56, 215, 247, 0.88);
        border-bottom: 2px solid rgba(56, 215, 247, 0.88);
        transform: rotate(45deg);
      }

      .menu-preview {
        position: absolute;
        z-index: 5;
        right: 70px;
        bottom: 105px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        color: rgba(246, 251, 255, 0.42);
        font-size: 13px;
        letter-spacing: 2px;
      }

      .menu-preview strong {
        color: rgba(246, 251, 255, 0.82);
        font-size: 18px;
        letter-spacing: 1px;
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="noise"></div>
      <header>
        <div class="brand">
          <img src="file:///E:/Ai%20Project/01.%E7%BD%91%E7%AB%99%E7%9B%B8%E5%85%B3%E8%B5%84%E6%96%99/LOGO/enhe_logo_final_exact_package/enhe_horizontal_color_transparent.png" alt="ENHE" />
          <nav>
            <span>首页</span>
            <span>本地应用</span>
            <span>云端工具</span>
            <span>用户中心</span>
          </nav>
        </div>
        <div class="menu" aria-label="Menu"><i></i><i></i><i></i></div>
      </header>

      <section class="copy">
        <h1>ENHE AI <em>Tools</em></h1>
        <div class="slogan">驾驭 AI 智能，重塑你的人生</div>
        <div class="sub">让高频工具变成你的行动引擎，把重复工作交给自动化，把时间留给成长与创造。</div>
      </section>

      <div class="core-wrap" aria-hidden="true">
        <div class="halo"></div>
        <div class="orbit"></div>
        <div class="orbit two"></div>
        <div class="cube">
          <img class="core-logo" src="file:///E:/Ai%20Project/01.%E7%BD%91%E7%AB%99%E7%9B%B8%E5%85%B3%E8%B5%84%E6%96%99/LOGO/enhe_logo_final_exact_package/enhe_icon_gradient_1024_transparent.png" alt="" />
        </div>
      </div>
      <div class="reflection" aria-hidden="true"></div>

      <div class="cta-row">
        <div class="cta primary">探索工具</div>
        <div class="cta">本地应用</div>
        <div class="cta">云端工具</div>
      </div>

      <div class="side-note">PAID DOWNLOAD UNLOCK</div>
      <div class="menu-preview"><span>01 / MENU STATE</span><strong>点击后进入全屏探索菜单</strong></div>
      <div class="scroll">SCROLL TO REVEAL TOOLS</div>
    </main>
  </body>
</html>
